adminUser: admin
adminPassword: camelk
image:
  tag: "11.6.9"
persistence:
  enabled: false
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
        access: proxy
        isDefault: true
      - name: Loki
        uid: loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
dashboards:
  default:
    camel-k-routes:
      json: |
        {
          "title": "Camel K – Route Metrics",
          "uid": "camel-k-routes",
          "description": "Per-route throughput, latency, rate-limit rejections and JVM health for all Camel K integrations. Filter by Integration and Route using the dropdowns.",
          "timezone": "browser",
          "refresh": "10s",
          "time": { "from": "now-30m", "to": "now" },
          "schemaVersion": 39,
          "version": 2,
          "templating": {
            "list": [
              {
                "name": "integration",
                "label": "Integration",
                "type": "query",
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "query": "label_values(camel_exchanges_total{eventType=\"route\"}, integration)",
                "definition": "label_values(camel_exchanges_total{eventType=\"route\"}, integration)",
                "refresh": 2,
                "sort": 1,
                "includeAll": true,
                "allValue": ".+",
                "multi": false,
                "current": {}
              },
              {
                "name": "routeId",
                "label": "Route",
                "type": "query",
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "query": "label_values(camel_exchanges_total{eventType=\"route\",integration=~\"$integration\"}, routeId)",
                "definition": "label_values(camel_exchanges_total{eventType=\"route\",integration=~\"$integration\"}, routeId)",
                "refresh": 2,
                "sort": 1,
                "includeAll": true,
                "allValue": ".+",
                "multi": true,
                "current": {}
              }
            ]
          },
          "panels": [
            {
              "id": 1,
              "type": "stat",
              "title": "Total RPS",
              "description": "Exchanges/s summed across all selected routes (1 m rate).",
              "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "unit": "reqps",
                  "color": { "mode": "thresholds" },
                  "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
                }
              },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
              "targets": [
                {
                  "expr": "sum(rate(camel_exchanges_total{integration=~\"$integration\", eventType=\"route\", routeId=~\"$routeId\"}[1m]))",
                  "refId": "A"
                }
              ]
            },
            {
              "id": 2,
              "type": "stat",
              "title": "Avg Processing Time",
              "description": "Mean Camel exchange processing time across all selected routes (5 m window). Derived from camel_route_policy_seconds_sum / _count.",
              "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "unit": "s",
                  "color": { "mode": "thresholds" },
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "green", "value": null },
                      { "color": "yellow", "value": 0.1 },
                      { "color": "red", "value": 0.5 }
                    ]
                  }
                }
              },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
              "targets": [
                {
                  "expr": "sum(rate(camel_route_policy_seconds_sum{integration=~\"$integration\", eventType=\"route\", routeId=~\"$routeId\"}[5m])) / sum(rate(camel_route_policy_seconds_count{integration=~\"$integration\", eventType=\"route\", routeId=~\"$routeId\"}[5m]))",
                  "refId": "A"
                }
              ]
            },
            {
              "id": 3,
              "type": "stat",
              "title": "Rate-Limit Rejections/s",
              "description": "Exchanges stopped by the token bucket per second (camel_exchanges_failures_handled_total). Covers Kafka and HTTP routes alike.",
              "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "unit": "reqps",
                  "color": { "mode": "thresholds" },
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "green", "value": null },
                      { "color": "orange", "value": 0.1 },
                      { "color": "red", "value": 1 }
                    ]
                  }
                }
              },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
              "targets": [
                {
                  "expr": "sum(rate(camel_exchanges_failures_handled_total{integration=~\"$integration\", eventType=\"route\", routeId=~\"$routeId\"}[1m]))",
                  "refId": "A"
                }
              ]
            },
            {
              "id": 4,
              "type": "stat",
              "title": "Success Rate",
              "description": "Fraction of exchanges that completed without error (succeeded / total). Rate-limit rejections count as handled, not failed, so a low success rate means actual errors.",
              "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "unit": "percentunit",
                  "color": { "mode": "thresholds" },
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "red", "value": null },
                      { "color": "yellow", "value": 0.9 },
                      { "color": "green", "value": 0.99 }
                    ]
                  }
                }
              },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
              "targets": [
                {
                  "expr": "sum(rate(camel_exchanges_succeeded_total{integration=~\"$integration\", eventType=\"route\", routeId=~\"$routeId\"}[1m])) / sum(rate(camel_exchanges_total{integration=~\"$integration\", eventType=\"route\", routeId=~\"$routeId\"}[1m]))",
                  "refId": "A"
                }
              ]
            },
            {
              "id": 5,
              "type": "stat",
              "title": "Inflight Exchanges",
              "description": "Exchanges currently being processed across all selected routes.",
              "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "unit": "short",
                  "color": { "mode": "thresholds" },
                  "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
                }
              },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
              "targets": [
                {
                  "expr": "sum(camel_exchanges_inflight{integration=~\"$integration\", routeId=~\"$routeId\"})",
                  "refId": "A"
                }
              ]
            },
            {
              "id": 6,
              "type": "stat",
              "title": "Running Routes",
              "description": "Number of Camel routes currently in STARTED state.",
              "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "unit": "short",
                  "color": { "mode": "thresholds" },
                  "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
                }
              },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
              "targets": [
                {
                  "expr": "sum(camel_routes_running_routes{integration=~\"$integration\"})",
                  "refId": "A"
                }
              ]
            },
            {
              "id": 7,
              "type": "timeseries",
              "title": "Throughput by Route (exchanges/s)",
              "description": "Per-route exchange rate (1 m rate). kafka-to-kafka, https-to-https, and https-to-kafka are the three bridge routes. Loader routes (load-*) show producer throughput.",
              "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": { "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 10 } }
              },
              "options": {
                "tooltip": { "mode": "multi", "sort": "desc" },
                "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"] }
              },
              "targets": [
                {
                  "expr": "sum by (routeId) (rate(camel_exchanges_total{integration=~\"$integration\", eventType=\"route\", routeId=~\"$routeId\"}[1m]))",
                  "legendFormat": "{{routeId}}",
                  "refId": "A"
                }
              ]
            },
            {
              "id": 8,
              "type": "timeseries",
              "title": "Accepted vs Rate-Limited per Route (exchanges/s)",
              "description": "Green = succeeded. Orange = stopped by the rate-limit token bucket (failures_handled). Zero orange means load is within SLA.",
              "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": { "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 8 } },
                "overrides": [
                  {
                    "matcher": { "id": "byRegexp", "options": "/^limited.*/" },
                    "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }]
                  },
                  {
                    "matcher": { "id": "byRegexp", "options": "/^ok.*/" },
                    "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }]
                  }
                ]
              },
              "options": {
                "tooltip": { "mode": "multi", "sort": "desc" },
                "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] }
              },
              "targets": [
                {
                  "expr": "sum by (routeId) (rate(camel_exchanges_succeeded_total{integration=~\"$integration\", eventType=\"route\", routeId=~\"$routeId\"}[1m]))",
                  "legendFormat": "ok / {{routeId}}",
                  "refId": "A"
                },
                {
                  "expr": "sum by (routeId) (rate(camel_exchanges_failures_handled_total{integration=~\"$integration\", eventType=\"route\", routeId=~\"$routeId\"}[1m]))",
                  "legendFormat": "limited / {{routeId}}",
                  "refId": "B"
                }
              ]
            },
            {
              "id": 9,
              "type": "timeseries",
              "title": "Route Mean Processing Time (s)",
              "description": "Average Camel exchange duration per route (camel_route_policy_seconds_sum / _count). Note: no histogram bucket is emitted, so only mean and max are available, not percentiles.",
              "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": { "unit": "s", "custom": { "lineWidth": 2 } }
              },
              "options": {
                "tooltip": { "mode": "multi", "sort": "desc" },
                "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"] }
              },
              "targets": [
                {
                  "expr": "sum by (routeId) (rate(camel_route_policy_seconds_sum{integration=~\"$integration\", eventType=\"route\", routeId=~\"$routeId\"}[1m])) / sum by (routeId) (rate(camel_route_policy_seconds_count{integration=~\"$integration\", eventType=\"route\", routeId=~\"$routeId\"}[1m]))",
                  "legendFormat": "mean / {{routeId}}",
                  "refId": "A"
                }
              ]
            },
            {
              "id": 10,
              "type": "timeseries",
              "title": "Route Max Processing Time (s)",
              "description": "Worst-case Camel exchange duration per route in each scrape interval (camel_route_policy_seconds_max). A spike here means one exchange took much longer than average.",
              "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": { "unit": "s", "custom": { "lineWidth": 2 } }
              },
              "options": {
                "tooltip": { "mode": "multi", "sort": "desc" },
                "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"] }
              },
              "targets": [
                {
                  "expr": "camel_route_policy_seconds_max{integration=~\"$integration\", eventType=\"route\", routeId=~\"$routeId\"}",
                  "legendFormat": "max / {{routeId}}",
                  "refId": "A"
                }
              ]
            },
            {
              "id": 11,
              "type": "timeseries",
              "title": "HTTP Responses: 202 Accepted vs 429 Rate-Limited (req/s)",
              "description": "Quarkus HTTP server counters split by status code and URI path. Shows only the /ingest/* paths. 429s appear here when HTTP clients exceed the token-bucket SLA.",
              "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": { "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 8 } },
                "overrides": [
                  {
                    "matcher": { "id": "byRegexp", "options": "/^429.*/" },
                    "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }]
                  },
                  {
                    "matcher": { "id": "byRegexp", "options": "/^202.*/" },
                    "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }]
                  }
                ]
              },
              "options": {
                "tooltip": { "mode": "multi", "sort": "desc" },
                "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] }
              },
              "targets": [
                {
                  "expr": "sum by (status, uri) (rate(http_server_requests_seconds_count{integration=~\"$integration\", status=~\"202|429\", uri=~\"/ingest/.*\"}[1m]))",
                  "legendFormat": "{{status}} {{uri}}",
                  "refId": "A"
                }
              ]
            },
            {
              "id": 12,
              "type": "timeseries",
              "title": "HTTP Request Mean Latency by URI (s)",
              "description": "Mean HTTP server request duration per /ingest/* path (http_server_requests_seconds_sum / _count). Separate from Camel route time — includes serialisation and Vert.x overhead.",
              "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": { "unit": "s", "custom": { "lineWidth": 2 } }
              },
              "options": {
                "tooltip": { "mode": "multi", "sort": "desc" },
                "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"] }
              },
              "targets": [
                {
                  "expr": "sum by (uri) (rate(http_server_requests_seconds_sum{integration=~\"$integration\", uri=~\"/ingest/.*\"}[1m])) / sum by (uri) (rate(http_server_requests_seconds_count{integration=~\"$integration\", uri=~\"/ingest/.*\"}[1m]))",
                  "legendFormat": "mean / {{uri}}",
                  "refId": "A"
                },
                {
                  "expr": "http_server_requests_seconds_max{integration=~\"$integration\", uri=~\"/ingest/.*\"}",
                  "legendFormat": "max / {{uri}}",
                  "refId": "B"
                }
              ]
            },
            {
              "id": 13,
              "type": "timeseries",
              "title": "JVM Heap: Used vs Max",
              "gridPos": { "h": 6, "w": 8, "x": 0, "y": 28 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": { "unit": "bytes", "custom": { "lineWidth": 2 } }
              },
              "options": {
                "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull"] }
              },
              "targets": [
                {
                  "expr": "sum by (pod) (jvm_memory_used_bytes{integration=~\"$integration\", area=\"heap\"})",
                  "legendFormat": "used – {{pod}}",
                  "refId": "A"
                },
                {
                  "expr": "sum by (pod) (jvm_memory_max_bytes{integration=~\"$integration\", area=\"heap\"})",
                  "legendFormat": "max – {{pod}}",
                  "refId": "B"
                }
              ]
            },
            {
              "id": 14,
              "type": "timeseries",
              "title": "CPU Usage",
              "gridPos": { "h": 6, "w": 8, "x": 8, "y": 28 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "unit": "percentunit",
                  "min": 0,
                  "max": 1,
                  "custom": { "lineWidth": 2 }
                }
              },
              "options": {
                "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] }
              },
              "targets": [
                {
                  "expr": "process_cpu_usage{integration=~\"$integration\"}",
                  "legendFormat": "process – {{pod}}",
                  "refId": "A"
                },
                {
                  "expr": "system_cpu_usage{integration=~\"$integration\"}",
                  "legendFormat": "system – {{pod}}",
                  "refId": "B"
                }
              ]
            },
            {
              "id": 15,
              "type": "timeseries",
              "title": "JVM Threads by State",
              "gridPos": { "h": 6, "w": 8, "x": 16, "y": 28 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": { "unit": "short", "custom": { "lineWidth": 2 } }
              },
              "options": {
                "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull"] }
              },
              "targets": [
                {
                  "expr": "sum by (state) (jvm_threads_states_threads{integration=~\"$integration\"})",
                  "legendFormat": "{{state}}",
                  "refId": "A"
                }
              ]
            },
            {
              "id": 16,
              "type": "logs",
              "title": "Integration Logs – WARN / ERROR",
              "description": "WARN and ERROR log lines from the selected integration pods. INFO and DEBUG are filtered out to reduce noise. Change the filter in the query to see all levels.",
              "gridPos": { "h": 10, "w": 24, "x": 0, "y": 34 },
              "datasource": { "type": "loki", "uid": "loki" },
              "options": {
                "showTime": true,
                "wrapLogMessage": true,
                "sortOrder": "Descending",
                "dedupStrategy": "none"
              },
              "targets": [
                {
                  "expr": "{namespace=\"camel-k\", pod=~\"$integration.*\"} |~ \"(WARN|ERROR)\"",
                  "refId": "A"
                }
              ]
            }
          ]
        }
