apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-nginx-conf
  namespace: camel-k
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 80;
        location / {
          add_header Content-Type application/json;
          return 200 '{"echo":"ok"}';
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-server
  namespace: camel-k
  labels:
    app: echo-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-server
  template:
    metadata:
      labels:
        app: echo-server
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: conf
          configMap:
            name: echo-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: echo-server
  namespace: camel-k
spec:
  selector:
    app: echo-server
  ports:
    - port: 80
      targetPort: 80
