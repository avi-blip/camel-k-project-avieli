# Requires the kafka-scram-credentials secret in the integration's namespace:
#   kamel run kafka-bridge.yaml --name kafka-bridge --config secret:kafka-scram-credentials
- from:
    uri: "kafka:source-topic"
    parameters:
      brokers: "kafka.kafka.svc.cluster.local:9092"
      groupId: "camel-bridge"
      autoOffsetReset: "earliest"
      securityProtocol: "SASL_PLAINTEXT"
      saslMechanism: "SCRAM-SHA-256"
      saslJaasConfig: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="{{kafka.user}}" password="{{kafka.password}}";'
    steps:
      - log: "Bridging message: ${body}"
      - to:
          uri: "kafka:sink-topic"
          parameters:
            brokers: "kafka.kafka.svc.cluster.local:9092"
            securityProtocol: "SASL_PLAINTEXT"
            saslMechanism: "SCRAM-SHA-256"
            saslJaasConfig: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="{{kafka.user}}" password="{{kafka.password}}";'
