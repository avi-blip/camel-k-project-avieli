# Exposes both the HTTP (8080) and HTTPS (8443) listeners of the rate-limited-bridge
# as NodePorts. TLS is terminated inside the pod (Quarkus/Vert.x, cert from ratelimit-tls
# secret) — no ingress is involved. Each protocol has its own separate Redis rate-limit
# bucket enforced at the Camel route level.
#
# HTTP:  http://<NODE_IP>:30080/ingest/client-c          → bucket client-c-http
# HTTPS: https://<NODE_IP>:30443/ingest/client-c-secure  → bucket client-c-https
apiVersion: v1
kind: Service
metadata:
  name: rate-limited-bridge-nodeports
  namespace: camel-k
  labels:
    camel.apache.org/integration: rate-limited-bridge
spec:
  type: NodePort
  selector:
    camel.apache.org/integration: rate-limited-bridge
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
    - name: https
      port: 8443
      targetPort: 8443
      nodePort: 30443
