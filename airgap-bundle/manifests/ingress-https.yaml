# TLS-terminating ingress (Traefik, built into k3s) in front of the
# rate-limited-bridge platform-http service — the HTTPS source for clients.
# Cert: kubectl create secret tls ratelimit-tls -n camel-k --cert=... --key=...
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rate-limited-bridge
  namespace: camel-k
spec:
  ingressClassName: traefik
  tls:
    - hosts: [ratelimit.local]
      secretName: ratelimit-tls
  rules:
    - host: ratelimit.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rate-limited-bridge
                port:
                  number: 80
